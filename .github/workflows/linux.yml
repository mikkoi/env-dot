name: linux

on:
  workflow_dispatch:
  pull_request:

jobs:
  perl:
    env:
      # some plugins still needs this to run their tests...
      PERL_USE_UNSAFE_INC: 0
      AUTHOR_TESTING: 1
      AUTOMATED_TESTING: 1
      RELEASE_TESTING: 1

    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        perl-version:
          - 'latest'
          - '5.34'
          - '5.28'
          - '5.22'
          - '5.20'
          # - '5.14' No dzil
          # - '5.12' No dzil
          # - '5.10' No dzil

    container:
      image: perldocker/perl-tester:${{ matrix.perl-version }}
      # https://hub.docker.com/r/perldocker/perl-tester/tags

    steps:
      - id: checkout
        name: Checkout
        uses: actions/checkout@v4

      - id: explore-tools-perl
        name: Explore Tools Perl
        shell: bash
        run: |
          perl -V

      - id: explore-tools-cpan
        name: Explore Tools Cpan
        shell: bash
        run: |
          cpan -V || true

      - id: explore-tools-cpanm
        name: Explore Tools Cpanm
        shell: bash
        run: |
          cpanm --version || true

      - id: explore-missing-dzil-authordeps
        name: Explore Missing Dist::Zilla Author Dependencies
        shell: bash
        run: |
          dzil authordeps --missing --cpanm-versions

      - id: install-missing-dzil-authordeps
        name: Install Missing Dist::Zilla Author Dependencies
        shell: bash
        run: |
          dzil authordeps --missing --cpanm-versions | cpanm --verbose --force --notest || true

      - id: explore-missing-deps
        name: Explore Missing Dependencies
        shell: bash
        run: |
          dzil listdeps --missing --develop --requires --no-recommends --no-suggests --cpanm-versions

      - id: install-missing-deps
        name: Install Missing Dependencies
        shell: bash
        run: |
          dzil listdeps --missing --develop --requires --no-recommends --no-suggests --cpanm-versions | cpanm --verbose --force --notest || true

      - id: run-tests
        name: Run Tests
        shell: bash
        run: |
          dzil test --all
